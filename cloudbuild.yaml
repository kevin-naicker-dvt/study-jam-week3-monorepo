# GCP Cloud Build CI/CD Pipeline
# Project: dvt-lab-devfest-2025
# Region:  africa-south1
#
# Substitution variables (set in Cloud Build trigger):
#   _REGION            = africa-south1
#   _REPO_NAME         = studyjam-repo
#   _BACKEND_SERVICE   = studyjam-backend
#   _FRONTEND_SERVICE  = studyjam-frontend
#   _DB_HOST           = <Cloud SQL private IP>
#   _DB_NAME           = studyjam
#   _DB_USER           = studyjam_user
#   _JWT_SECRET_NAME   = studyjam-jwt-secret   (GCP Secret Manager secret name)
#   _DB_PASSWORD_NAME  = studyjam-db-password  (GCP Secret Manager secret name)

substitutions:
  _REGION: africa-south1
  _REPO_NAME: studyjam-repo
  _BACKEND_SERVICE: studyjam-backend
  _FRONTEND_SERVICE: studyjam-frontend

steps:
  # ── Step 1: Build backend Docker image ───────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_BACKEND_SERVICE}:$COMMIT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_BACKEND_SERVICE}:latest'
      - './backend'

  # ── Step 2: Push backend image to Artifact Registry ──────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    waitFor: ['build-backend']
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_BACKEND_SERVICE}'

  # ── Step 3: Deploy backend to Cloud Run ──────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    waitFor: ['push-backend']
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_BACKEND_SERVICE}'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_BACKEND_SERVICE}:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3000'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--set-env-vars=NODE_ENV=production,PORT=3000,DB_HOST=${_DB_HOST},DB_PORT=5432,DB_NAME=${_DB_NAME},DB_USER=${_DB_USER}'
      - '--set-secrets=DB_PASSWORD=${_DB_PASSWORD_NAME}:latest,JWT_SECRET=${_JWT_SECRET_NAME}:latest'
      - '--service-account=studyjam-cloudrun-sa@$PROJECT_ID.iam.gserviceaccount.com'

  # ── Step 4: Health check backend before deploying frontend ───────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'health-check-backend'
    waitFor: ['deploy-backend']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        BACKEND_URL=$(gcloud run services describe ${_BACKEND_SERVICE} \
          --region=${_REGION} --format='value(status.url)')
        echo "Backend URL: $BACKEND_URL"
        for i in $(seq 1 10); do
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BACKEND_URL/health")
          echo "Health check attempt $i - HTTP $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "Backend health check passed!"
            exit 0
          fi
          sleep 5
        done
        echo "Backend health check failed after 10 attempts"
        exit 1

  # ── Step 5: Build frontend Docker image ──────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'get-backend-url'
    waitFor: ['health-check-backend']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        BACKEND_URL=$(gcloud run services describe ${_BACKEND_SERVICE} \
          --region=${_REGION} --format='value(status.url)')
        echo "$BACKEND_URL/api" > /workspace/backend_url.txt
        echo "Backend API URL: $BACKEND_URL/api"

  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    waitFor: ['get-backend-url']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        BACKEND_API_URL=$(cat /workspace/backend_url.txt)
        docker build \
          --build-arg VITE_API_URL="$BACKEND_API_URL" \
          -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_FRONTEND_SERVICE}:$COMMIT_SHA \
          -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_FRONTEND_SERVICE}:latest \
          ./frontend

  # ── Step 6: Push frontend image ──────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    waitFor: ['build-frontend']
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_FRONTEND_SERVICE}'

  # ── Step 7: Deploy frontend to Cloud Run ─────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    waitFor: ['push-frontend']
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_FRONTEND_SERVICE}'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_FRONTEND_SERVICE}:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--service-account=studyjam-cloudrun-sa@$PROJECT_ID.iam.gserviceaccount.com'

  # ── Step 8: Output deployed URLs ─────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'output-urls'
    waitFor: ['deploy-frontend']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "=== Deployment Complete ==="
        echo "Backend: $(gcloud run services describe ${_BACKEND_SERVICE} --region=${_REGION} --format='value(status.url)')"
        echo "Frontend: $(gcloud run services describe ${_FRONTEND_SERVICE} --region=${_REGION} --format='value(status.url)')"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'
