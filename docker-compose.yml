version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: studyjam-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: studyjam
      POSTGRES_USER: studyjam_user
      POSTGRES_PASSWORD: localpassword
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U studyjam_user -d studyjam']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    container_name: studyjam-backend
    restart: unless-stopped
    command: npm run start:dev
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: studyjam
      DB_USER: studyjam_user
      DB_PASSWORD: localpassword
      JWT_SECRET: local_dev_jwt_secret_change_in_production
      FRONTEND_URL: http://localhost:5173
    ports:
      - '3000:3000'
    volumes:
      - ./backend/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    container_name: studyjam-frontend
    restart: unless-stopped
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_API_URL: http://localhost:3000/api
    ports:
      - '5173:5173'
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

volumes:
  postgres_data:
